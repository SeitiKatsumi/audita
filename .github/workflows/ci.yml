name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Check server syntax
        run: node --check server.mjs

      - name: Check browser script syntax
        run: node --check app.js

      - name: Build Docker image
        run: docker build -t audita-ci .
